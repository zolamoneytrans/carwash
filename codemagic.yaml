workflows:
  ios-app-store:
    name: Build and publish iOS app to App Store Connect
    max_build_duration: 120
    environment:
      vars:
        APP_IDENTIFIER: "africa.carwashes.noq"
        APPLE_TEAM_ID: "44Z38W9GRD"
    scripts:
      - name: Install dependencies
        script: |
          echo "Using native Xcode project at ios/CarWash.xcodeproj"
      - name: Build iOS app archive
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/build"
          xcodebuild -project ios/CarWash.xcodeproj \
            -scheme CarWash \
            -configuration Release \
            -sdk iphoneos \
            archive \
            -archivePath "$CM_BUILD_DIR/build/CarWash.xcarchive" \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates
      - name: Export App Store package
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/build/ios"
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/CarWash.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios" \
            -exportOptionsPlist ios/exportOptions.plist
    publishing:
      app_store_connect:
        api_key:
          key_id: $APP_STORE_CONNECT_API_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        app_id: $APP_IDENTIFIER
        submit_for_review: false
